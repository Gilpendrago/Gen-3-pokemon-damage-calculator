<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gen 3 Damage Calculator</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>Pokemon Gen 3 Damage Calculator</h1>
    <p class="subtitle">Simple and clean calculator for battle planning.</p>

    <form id="damage-form" class="card">

      <div class="grid-2">

        <!-- LEFT SIDE (ATTACKER) -->
        <div class="left-col">
          
          <label>
            Level
            <input id="level" type="number" min="1" max="100" value="50" required />
          </label>

          <label>
            Attack
            <input id="attack" type="number" min="1" value="100" required />
          </label>

          <label>
            Move Power
            <input id="move-power" type="number" min="1" value="80" required />
          </label>

          <label>
            Category
            <select id="category">
              <option value="physical">Physical</option>
              <option value="special">Special</option>
            </select>
          </label>

          <label>
            Move Type
            <select id="move-type"></select>
          </label>

          <!-- STAB + CRIT -->
          <div class="inline-row">
            <label>
              STAB
              <input type="checkbox" id="stab" />
            </label>

            <label>
              Crit
              <input type="checkbox" id="crit" />
            </label>
          </div>

        </div>

        <!-- RIGHT SIDE (DEFENDER) -->
        <div class="right-col">

          <label>
            Defense
            <input id="defense" type="number" min="1" value="100" required />
          </label>

          <label>
            HP (optional)
            <input id="hp" type="number" min="1" placeholder="e.g. 200" />
          </label>

          <label>
            Defender Type 1
            <select id="def-type-1"></select>
          </label>

          <label>
            Defender Type 2
            <select id="def-type-2">
              <option value="">None</option>
            </select>
          </label>

        </div>

      </div>

      <button type="submit">Calculate Damage</button>
    </form>

    <section id="result" class="card result" aria-live="polite">
      <h2>Result</h2>
      <p>Enter values and calculate to see output.</p>
    </section>

  </main>

  <script src="script.js"></script>
</body>
</html>
